  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    /* Logo Image */
    .logo img {
      height: 50px;   /* adjust size here */
      width: auto;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #d30404;
    }

    /* Blank Section */
   .content {
  padding-top: 100px;
  padding-bottom: 100px;
  padding-left: 20px;
  padding-right: 2px;
  background: white;
}

    /* Footer */
    .footer-up {
      background: #000000;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .about-container {
  display: flex;
  justify-content: center;
  align-items: center;
}

.contact-container {
  max-width: 600px;
  margin: 120px auto 50px auto; /* adjust for navbar */
  text-align: center;
  padding: 20px;
  background: #fff;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.contact-container h2 {
  margin-bottom: 10px;
}

.contact-container p {
  color: #555;
  margin-bottom: 20px;
}

.contact-form {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.contact-form input,
.contact-form textarea {
  padding: 12px 15px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 14px;
  transition: all 0.3s;
}

.contact-form input:focus,
.contact-form textarea:focus {
  border-color: #d30404;
  box-shadow: 0 0 5px rgba(211, 4, 4, 0.5);
  outline: none;
}

.contact-form button {
  padding: 12px 20px;
  border: none;
  background: #d30404;
  color: #fff;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.contact-form button:hover {
  background: #a10202;
  transform: scale(1.05);
}

/* Contact info */
.contact-info {
  margin-top: 25px;
  color: #555;
  font-size: 14px;
}

.contact-info i {
  margin-right: 8px;
  color: #d30404;
}

/* Social Icons */
.social-icons {
  margin-top: 20px;
}

.social-icons a {
  color: #333;
  margin: 0 10px;
  font-size: 22px;
  transition: 0.3s;
}

.social-icons a:hover {
  color: #d30404;
  transform: scale(1.2);
}

footer {
    background-color: #222;
    color: #fff;
    padding: 20px 0;
}

.footer-container {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    padding: 0 20px ;

}

.footer-left h3 {
    margin: 0 0 10px;
}

.footer-center a, .footer-right a {
    color: #fff;
    margin: 0  5px;
    text-decoration: none;
    transition: color 0.3s;
}

.footer-center a:hover, .footer-right a:hover {
    color: #d30404;
}

.footer-right .social {
    font-weight: bold;
}

 /* Responsive Nav -----*/
/* Hamburger */
.menu-toggle {
  display: none;
  font-size: 24px;
  cursor: pointer;
}

/* Mobile Styles */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    right: 0;
    background: white;
    width: 100%;
    flex-direction: column;
    text-align: center;
    display: none;
  }

  .nav-links a {
    display: block;
    padding: 15px;
    border-top: 1px solid #eee;
  }

  .nav-links.active {
    display: flex;
  }
}
.nav-links {
  transition: all 0.3s ease;
}

  </style>
</head>

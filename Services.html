      width: 100%;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px;

.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  max-width: 1000px;
  margin: 0 auto;
}

.video-card iframe {
  width: 100%;
  height: 180px;
  border-radius: 10px;
}

.video-card p {
  margin-top: 8px;
  font-size: 14px;
  font-weight: 500;
  text-align: left;
}

.video-card p {
  color: #333;
  line-height: 1.4;
}

.video-card:hover {
  transform: scale(1.03);
  transition: 0.3s;
}

footer {

.footer-left h3 {

.footer-center a, .footer-right a {

}

.footer-center a:hover, .footer-right a:hover {

.footer-right .social {

    .logos img {

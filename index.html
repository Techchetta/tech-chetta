  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    /* Logo Image */
    .logo img {
      height: 50px;   /* adjust size here */
      width: auto;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #d30404;
    }

    /* Video Banner */
    .video-container {
      margin-top: 0px;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Blank Section */
    .content {
      height: 600px;
      background: white;
    }

/* Footer */
.footer {
    background: #0d0f14;
    color: #ccc;
    padding: 40px 60px 20px;
}

/* Top section */
.footer-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
}

/* Left side */
.footer-left {
    display: flex;
    align-items: center;
    gap: 15px;
    max-width: 600px;
}

.footer-left img {
    width: 80px;
    height: 55px;
}

.footer-text h3 {
    color: #fff;
    margin-bottom: 5px;
    font-size: 18px;
}

.footer-text p {
    font-size: 14px;
    line-height: 1.5;
}

/* Social icons */
.footer-right {
    display: flex;
    gap: 10px;
}

.footer-right a {
    color: #fff;
    background: #1a1d23;
    padding: 10px;
    border-radius: 6px;
    transition: 0.3s;
}

.footer-right a:hover {
    background: #ff0000;
}

/* Bottom */
.footer-bottom {
    border-top: 1px solid #222;
    margin-top: 30px;
    padding-top: 15px;

    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 14px;
}

/* Links */
.footer-links {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

.footer-links a {
    color: #ccc;
    text-decoration: none;
}

.footer-links a:hover {
    color: #ff0000;
}

/* Responsive */
@media (max-width: 768px) {
    .footer {
        padding: 30px 20px;
    }

    .footer-top {
        flex-direction: column;
        align-items: flex-start;
    }

    .footer-left {
        flex-direction: column;
        align-items: flex-start;
    }

    .footer-bottom {
        flex-direction: column;
        align-items: flex-start;
    }

    .footer-right {
        margin-top: 10px;
    }
}

.card-section {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
  padding: 50px;
  background: #f5f5f5;
}

.card {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  border-radius: 10px;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}

.card:hover img {
  transform: scale(1.1);
}

.card-text {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  color: white;
  font-weight: 500;
  text-align: center;
}

  /* Responsive Nav -----*/
/* Hamburger */
.menu-toggle {
  display: none;
  font-size: 24px;
  cursor: pointer;
}

/* Mobile Styles */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    right: 0;
    background: white;
    width: 100%;
    flex-direction: column;
    text-align: center;
    display: none;
  }

  .nav-links a {
    display: block;
    padding: 15px;
    border-top: 1px solid #eee;
  }

  .nav-links.active {
    display: flex;
  }
}
.nav-links {
  transition: all 0.3s ease;
}

  </style>

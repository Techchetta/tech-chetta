  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    /* Logo Image */
    .logo img {
      height: 50px;   /* adjust size here */
      width: auto;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #d30404;
    }

    /* Video Banner */
    .video-container {
      margin-top: 0px;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Blank Section */
    .content {
      height: 600px;
      background: white;
    }

    /* Footer */
    .footer-up {
      background: #000000;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
    }

    footer {
    background-color: #222;
    color: #fff;
    padding: 20px 0;
}

.footer-container {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    padding: 0 20px ;

}

.footer-left h3 {
    margin: 0 0 10px;
}

.footer-center a, .footer-right a {
    color: #fff;
    margin: 0  5px;
    text-decoration: none;
    transition: color 0.3s;
}

.footer-center a:hover, .footer-right a:hover {
    color: #d30404;
}

.footer-right .social {
    font-weight: bold;
}

.card-section {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
  padding: 50px;
  background: #f5f5f5;
}

.card {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  border-radius: 10px;
}

.card img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}

.card:hover img {
  transform: scale(1.1);
}

.card-text {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  color: white;
  font-weight: 500;
  text-align: center;
}

  /* Responsive Nav -----*/
/* Hamburger */
.menu-toggle {
  display: none;
  font-size: 24px;
  cursor: pointer;
}

/* Mobile Styles */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    right: 0;
    background: white;
    width: 100%;
    flex-direction: column;
    text-align: center;
    display: none;
  }

  .nav-links a {
    display: block;
    padding: 15px;
    border-top: 1px solid #eee;
  }

  .nav-links.active {
    display: flex;
  }
}
.nav-links {
  transition: all 0.3s ease;
}

  </style>
</head>

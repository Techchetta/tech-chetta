  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    /* Logo Image */
    .logo img {
      height: 50px;   /* adjust size here */
      width: auto;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #d30404;
    }



    /* Blank Section */
   .content {
  padding-top: 100px;
  padding-bottom: 100px;
  padding-left: 20px;
  padding-right: 2px;
  background: white;
}

    /* Footer */
    .footer-up {
      background: #000000;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .footer {
      background: #222;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .about-container {
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Card */
.profile-card {
  background: #ebebeb15;
  padding: 35px;
  max-width: 380px;
  text-align: center;
  border-radius: 25px;
  box-shadow: 10px 10px 30px rgba(0,0,0,0.1);
  transition: all 0.3s ease;
}

/* Hover Effect */
.profile-card:hover {
  transform: translateY(-10px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

/* Image */
.profile-img {
  width: 240px;
  height: 240px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 15px;
  border: 4px solid #f2f2f2;
  transition: 0.3s;
}

.profile-card:hover .profile-img {
  transform: scale(1.05);
}

/* Text */
.profile-card h2 {
  margin-bottom: 5px;
}

.title {
  color: #777;
  margin-bottom: 15px;
}

.bio {
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* Social Icons */
.social-icons {
  margin-bottom: 20px;
}

.social-icons a {
  color: #333;
  margin: 0 10px;
  font-size: 20px;
  transition: 0.3s;
}

.social-icons a:hover {
  color: #d30404;
  transform: scale(1.2);
}

/* Skills */
.skills {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

.skills span {
  background: #f2f2f2;
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  transition: 0.3s;
}

.skills span:hover {
  background: #d30404;
  color: white;
}
footer {
    background-color: #222;
    color: #fff;
    padding: 20px 0;
}

.footer-container {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    padding: 0 20px ;

}

.footer-left h3 {

}

.footer-center a, .footer-right a {
    color: #fff;
    margin: 0  5px;
    text-decoration: none;
    transition: color 0.3s;
}

.footer-center a:hover, .footer-right a:hover {
    color: #d30404;
}

.footer-right .social {
    font-weight: bold;
}

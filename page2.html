<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tech chetta</title>

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="resource/favicon.ico">

  <!-- QR LIBRARIES -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
    }

    /* NAVBAR */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      z-index: 1000;
    }

    .logo img {
      height: 50px;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: black;
      font-weight: 500;
    }

    .nav-links a:hover {
      color: #d30404;
    }

    .menu-toggle {
      display: none;
      font-size: 24px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .menu-toggle { display: block; }

      .nav-links {
        position: absolute;
        top: 70px;
        right: 0;
        background: white;
        width: 100%;
        flex-direction: column;
        text-align: center;
        display: none;
      }

      .nav-links.active {
        display: flex;
      }

      .nav-links a {
        padding: 15px;
        border-top: 1px solid #eee;
      }
    }

    /* SPACER */
    .content {
      height: 80px;
    }

    /* MAIN CONTENT */
    .contents {
      margin: 20px;
    }

    h2 {
      text-align: center;
      margin-top: 20px;
      color: #2c3e50;
    }

    /* QR BOX */
    .qr-container {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .qr-container input,
    .qr-container select {
      width: 80%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #be0020;
      border-radius: 5px;
      text-align: center;
    }

    .contentscolor {
      width: 80%;
      height: 100px;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #be0020;
      border-radius: 5px;
      text-align: center;
    }

    #output canvas,
#output img {
  display: block;
  margin: 0 auto;
     margin-bottom: 20px;
}

    button {
      background-color: #eb0029;
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 5px;
      width: 80%;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover {
      background-color: #be0020;
    }

    #output {
      margin-top: 15px;
    }

/* Footer */
.footer {
    background: #0d0f14;
    color: #ccc;
    padding: 40px 60px 20px;
}

/* Top section */
.footer-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
}

/* Left side */
.footer-left {
    display: flex;
    align-items: center;
    gap: 15px;
    max-width: 600px;
}

.footer-left img {
    width: 80px;
    height: 55px;
}

.footer-text h3 {
    color: #fff;
    margin-bottom: 5px;
    font-size: 18px;
}

.footer-text p {
    font-size: 14px;
    line-height: 1.5;
}

/* Social icons */
.footer-right {
    display: flex;
    gap: 10px;
}

.footer-right a {
    color: #fff;
    background: #1a1d23;
    padding: 10px;
    border-radius: 6px;
    transition: 0.3s;
}

.footer-right a:hover {
    background: #ff0000;
}

/* Bottom */
.footer-bottom {
    border-top: 1px solid #222;
    margin-top: 30px;
    padding-top: 15px;

    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 14px;
}

/* Links */
.footer-links {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

.footer-links a {
    color: #ccc;
    text-decoration: none;
}

.footer-links a:hover {
    color: #ff0000;
}

/* Responsive */
@media (max-width: 768px) {
    .footer {
        padding: 30px 20px;
    }

    .footer-top {
        flex-direction: column;
        align-items: flex-start;
    }

    .footer-left {
        flex-direction: column;
        align-items: flex-start;
    }

    .footer-bottom {
        flex-direction: column;
        align-items: flex-start;
    }

    .footer-right {
        margin-top: 10px;
    }
}
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="resource/logo.png">
  </div>

  <div class="menu-toggle" onclick="toggleMenu()">
    <i class="fas fa-bars"></i>
  </div>

    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="Services.html">Services</a>
      <a href="contact.html">Contact</a>
      <a href="about.html">About</a>
    </div>
</div>

<div class="content"></div>

<!-- MAIN -->
<div class="contents">

  <h2>QR & Barcode Generator</h2>

  <div class="qr-container">

    <input type="text" id="textInput" placeholder="Enter text or link">

    <select id="type">
      <option value="qr">QR Code</option>
      <option value="barcode">Barcode</option>
    </select>

    <input type="color" class="contentscolor" id="qrColor" value="#000000">
    <input type="color" class="contentscolor" id="bgColor" value="#ffffff">
    <input type="file" id="logoInput">

    <button onclick="generateCode()">Generate</button>

    <div class="output" id="output"></div>

    <button onclick="downloadImage()">Download</button>
    <button onclick="shareCode()">Share</button>

  </div>

</div>


<script>
function toggleMenu() {
  document.getElementById("navLinks").classList.toggle("active");
}

/* GENERATOR */
function generateCode() {
  const text = document.getElementById("textInput").value.trim();
  const type = document.getElementById("type").value;
  const output = document.getElementById("output");
  const logoInput = document.getElementById("logoInput").files[0];

  if (!text) return;

  output.innerHTML = "";

  if (type === "qr") {
    const qrDiv = document.createElement("div");
    output.appendChild(qrDiv);

    const qr = new QRCode(qrDiv, {
      text: text,
      width: 200,
      height: 200,
      colorDark: document.getElementById("qrColor").value,
      colorLight: document.getElementById("bgColor").value
    });

    // Add logo after QR is generated
    setTimeout(() => {
      const canvas = qrDiv.querySelector("canvas");
      if (!canvas || !logoInput) return;

      const ctx = canvas.getContext("2d");
      const img = new Image();

      img.onload = function () {
        const size = 50; // logo size
        const x = (canvas.width - size) / 2;
        const y = (canvas.height - size) / 2;

        ctx.drawImage(img, x, y, size, size);
      };

      img.src = URL.createObjectURL(logoInput);
    }, 300);

  } else {
    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    output.appendChild(svg);
    JsBarcode(svg, text, { format: "CODE128" });
  }
}

/* DOWNLOAD */
function downloadImage() {
  const output = document.getElementById("output");
  const canvas = output.querySelector("canvas");
  const img = output.querySelector("img");
  const svg = output.querySelector("svg");

  /* QR (canvas) */
  if (canvas) {
    const link = document.createElement("a");
    link.download = "qrcode.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    return;
  }

  /* QR fallback (img) */
  if (img) {
    const link = document.createElement("a");
    link.download = "qrcode.png";
    link.href = img.src;
    link.click();
    return;
  }

  /* BARCODE → convert SVG → PNG */
  if (svg) {
    const serializer = new XMLSerializer();
    const source = serializer.serializeToString(svg);

    const img = new Image();
    const svgBlob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(svgBlob);

    img.onload = function () {
      const canvas = document.createElement("canvas");
      canvas.width = img.width;
      canvas.height = img.height;

      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff"; // background
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);

      URL.revokeObjectURL(url);

      const link = document.createElement("a");
      link.download = "barcode.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    };

    img.src = url;
    return;
  }

  alert("Nothing to download!");
}

/* SHARE */
function shareCode() {
  if (navigator.share) {
    navigator.share({ text: document.getElementById("textInput").value });
  } else {
    alert("Sharing not supported");
  }
}
</script>
